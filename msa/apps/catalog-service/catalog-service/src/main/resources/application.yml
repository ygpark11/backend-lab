spring:
  application:
    name: catalog-service

  threads:
    virtual:
      enabled: true

  messages:
    basename: errors

  cache:
    type: caffeine

  profiles:
    active: local
    include: secret

  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 100
          order_updates: true
        default_batch_fetch_size: 100
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
  ai:
    openai:
      api-key: ${SPRING_AI_API_KEY} # 구글 AI Studio 키

igdb:
  client-id: ${IGDB_CLIENT_ID}
  client-secret: ${IGDB_CLIENT_SECRET}
  auth-url: ${IGDB_AUTH_URL}
  api-url: ${IGDB_API_URL}

jwt:
  secret: ${JWT_SECRET}
  expiration:
    access: 3600000
    refresh: 1209600000

crawler:
  primary-url: ${CRAWLER_PRIMARY_URL:http://collector-service:5000}
  secondary-url: ${CRAWLER_SECONDARY_URL:}
  secret-key: ${CRAWLER_SECRET_KEY}

app:
  base-url: https://ps-signal.com

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
