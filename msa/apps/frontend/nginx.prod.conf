# Caddy가 SSL + HTTP→HTTPS 리다이렉트를 처리함
# nginx는 내부 라우팅만 담당 (HTTP only)

# SNS/검색 크롤러 User-Agent 감지 (OG 메타 태그 서빙용)
map $http_user_agent $is_crawler {
    default                                                    0;
    ~*(googlebot|bingbot|yandexbot|applebot)                   1;
    ~*(twitterbot|facebookexternalhit|facebookcatalog)         1;
    ~*(kakaotalk|naverbot|yeti|daumoa)                         1;
    ~*(linkedinbot|whatsapp|telegrambot|discordbot|slackbot)   1;
}

server {
    listen 80;
    server_name ps-signal.com www.ps-signal.com;

    # Game detail: SNS 크롤러는 백엔드 OG 엔드포인트로, 일반 사용자는 SPA
    location ~ ^/games/(\d+)$ {
        root /usr/share/nginx/html;
        if ($is_crawler) {
            rewrite ^/games/(\d+)$ /api/og/game/$1 last;
        }
        try_files $uri /index.html;
    }

    # 1. 프론트엔드 (React)
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. 백엔드 API
    location /api {
        proxy_pass http://catalog-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # 3. OAuth2 요청 (/oauth2/authorization/google)
    location /oauth2 {
        proxy_pass http://catalog-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # 4. OAuth2 콜백 (/login/oauth2/code/google)
    location /login {
        proxy_pass http://catalog-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location /actuator {
        proxy_pass http://catalog-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}