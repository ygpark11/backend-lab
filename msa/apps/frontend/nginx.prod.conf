# Caddy가 SSL + HTTP→HTTPS 리다이렉트를 처리함
# nginx는 내부 라우팅만 담당 (HTTP only)
server {
    listen 80;
    server_name ps-signal.com www.ps-signal.com;

    # 1. 프론트엔드 (React)
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. 백엔드 API
    location /api {
        proxy_pass http://catalog-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # 3. OAuth2 요청 (/oauth2/authorization/google)
    location /oauth2 {
        proxy_pass http://catalog-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # 4. OAuth2 콜백 (/login/oauth2/code/google)
    location /login {
        proxy_pass http://catalog-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location /actuator {
        proxy_pass http://catalog-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}