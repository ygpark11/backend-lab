# SNS/검색 크롤러 User-Agent 감지 (OG 메타 태그 서빙용)
map $http_user_agent $is_crawler {
    default                                                    0;
    ~*(googlebot|bingbot|yandexbot|applebot)                   1;
    ~*(twitterbot|facebookexternalhit|facebookcatalog)         1;
    ~*(kakaotalk|naverbot|yeti|daumoa)                         1;
    ~*(linkedinbot|whatsapp|telegrambot|discordbot|slackbot)   1;
}

  server {
    listen 80;
    server_name localhost;

    # Game detail: SNS 크롤러는 백엔드 OG 엔드포인트로, 일반 사용자는 SPA
    location ~ ^/games/(\d+)$ {
        root /usr/share/nginx/html;
        if ($is_crawler) {
            rewrite ^/games/(\d+)$ /api/og/game/$1 last;
        }
        try_files $uri /index.html;
    }

    # 1. 프론트엔드
    location / {
    root   /usr/share/nginx/html;
    index  index.html index.htm;
    try_files $uri $uri/ /index.html;
    }

    # 2. 백엔드 API
    location /api {
    proxy_pass http://catalog-service:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. OAuth2 및 로그인 리다이렉트
    location /oauth2 {
    proxy_pass http://catalog-service:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. OAuth2 및 로그인 리다이렉트
    location /login {
    proxy_pass http://catalog-service:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. Adminer
    location /adminer/ {
    proxy_pass http://ps-tracker-adminer:8080/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /actuator {
        proxy_pass http://catalog-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
  }