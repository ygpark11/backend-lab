name: Deploy Brain (Catalog Service)

# 1. 트리거:
on:
  push:
    branches: [ "master" ]
    paths:
      - 'msa/apps/catalog-service/**'       # 자바 쪽 코드가 변경되거나
      - 'msa/docker-compose-brain.yml'      # 1호기 설정이 변경되거나
      - '.github/workflows/deploy-brain.yml' # 이 파일 자체가 변경될 때만 실행

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 내려받기
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. JDK 세팅 (테스트 실행용)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Gradle 캐싱
      - name: Gradle Caching
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. 테스트 실행 (실패 시 이후 빌드/배포 중단)
      - name: Run Tests
        run: |
          cd msa/apps/catalog-service/catalog-service
          chmod +x ./gradlew
          ./gradlew test

      # 5. QEMU 세팅 (ARM64 크로스 빌드를 위한 에뮬레이터)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 6. Docker Buildx 세팅 (멀티 플랫폼 빌드 엔진)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 7. 도커 허브 로그인
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 8. 도커 이미지 빌드 & 허브로 전송 (AMD64 + ARM64 멀티 아키텍처 지원)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: msa/apps/catalog-service/catalog-service
          file: msa/apps/catalog-service/catalog-service/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKER_USERNAME }}/ps-tracker-api:latest

      # 9. 새 서버(A1)에 접속해서 배포 명령 내리기
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/backend-lab/msa

            # 1. 최신 설정파일(docker-compose 등) 받기
            git pull origin master

            # 2. 최신 이미지 당겨오기 (ARM 네이티브 버전으로 다운로드됨)
            docker compose -f docker-compose-brain.yml pull catalog-service

            # 3. 컨테이너 교체 (무중단 갱신)
            docker compose -f docker-compose-brain.yml up -d catalog-service

            # 4. 뒷정리 (이미지 찌꺼기 청소)
            docker image prune -f